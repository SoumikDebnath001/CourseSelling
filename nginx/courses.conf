# ──────────────────────────────────────────────────────────
# Course Selling App — courses.obuyagrassrootsfoundation.org
# File: /etc/nginx/sites-available/courses
# ──────────────────────────────────────────────────────────

server {
    listen 80;
    server_name courses.obuyagrassrootsfoundation.org www.courses.obuyagrassrootsfoundation.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name courses.obuyagrassrootsfoundation.org www.courses.obuyagrassrootsfoundation.org;

    ssl_certificate     /etc/letsencrypt/live/courses.obuyagrassrootsfoundation.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/courses.obuyagrassrootsfoundation.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    # ── Backend API ──────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ── Frontend (Next.js) ───────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
