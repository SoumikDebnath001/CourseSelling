# ──────────────────────────────────────────────────────────
# Course Selling App — courses.obuyagrassrootsfoundation.org
# Add this file to your existing Nginx config directory
# ──────────────────────────────────────────────────────────

server {
    listen 80;
    server_name courses.obuyagrassrootsfoundation.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name courses.obuyagrassrootsfoundation.org;

    # SSL certs (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/courses.obuyagrassrootsfoundation.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/courses.obuyagrassrootsfoundation.org/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Max upload size
    client_max_body_size 100M;

    # ── Backend API ──────────────────────────────────────
    location /api/ {
        proxy_pass http://courses-backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ── Frontend (Next.js) ───────────────────────────────
    location / {
        proxy_pass http://courses-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
