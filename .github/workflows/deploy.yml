name: Build & Deploy to Hostinger VPS

on:
  push:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/cricket-academy-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/cricket-academy-frontend

jobs:
  # ────────────────────────────────────────────────────────
  # 1. Build & Push Docker images to Docker Hub
  # ────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      # ── Build Backend ──────────────────────────────────
      - name: Build & Push Backend
        uses: docker/build-push-action@v6.18.0
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build Frontend ─────────────────────────────────
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6.18.0
        with:
          context: ./Frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────
  # 2. Deploy to Hostinger VPS via SSH
  # ────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Create shared network if it doesn't exist
            docker network create shared-proxy 2>/dev/null || true

            cd ~/cricket-academy

            # Pull latest images
            docker compose pull

            # Restart with zero-downtime
            docker compose up -d --remove-orphans

            # Connect existing Nginx to shared network (if not already)
            NGINX_CONTAINER=$(docker ps --filter "name=nginx" --format '{{.Names}}' | head -1)
            if [ -n "$NGINX_CONTAINER" ]; then
              docker network connect shared-proxy "$NGINX_CONTAINER" 2>/dev/null || true
              docker exec "$NGINX_CONTAINER" nginx -s reload
            fi

            # Clean up old images
            docker image prune -f

            echo "✅ Deployment complete!"
