services:
  # ── Backend (Express API) ─────────────────────────────
  backend:
    image: ${DOCKER_USERNAME}/courses-backend:latest
    container_name: courses-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
    # Bind to loopback only: the API must be reached through the Nginx TLS proxy,
    # never directly on the host's public interface.
    ports:
      - "127.0.0.1:4000:4000"

  # ── Frontend (Next.js) ────────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME}/courses-frontend:latest
    container_name: courses-frontend
    restart: unless-stopped
    # Loopback only — public traffic terminates at Nginx (TLS) and is proxied in.
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - backend
