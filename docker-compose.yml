services:
  # ── Backend (Express API) ─────────────────────────────
  backend:
    image: ${DOCKER_USERNAME}/cricket-academy-backend:latest
    container_name: courses-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"
    networks:
      - courses-net
      - shared-proxy

  # ── Frontend (Next.js) ────────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME}/cricket-academy-frontend:latest
    container_name: courses-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - courses-net
      - shared-proxy
    depends_on:
      - backend

networks:
  courses-net:
    driver: bridge
  shared-proxy:
    external: true
