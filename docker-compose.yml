services:
  # ── Backend (Express API) ─────────────────────────────
  backend:
    image: ${DOCKER_USERNAME}/cricket-academy-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (Next.js) ────────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME}/cricket-academy-frontend:latest
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  # ── Nginx (Reverse Proxy + SSL termination) ──────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
