services:
  # ── Backend (Express API) ─────────────────────────────
  backend:
    image: ${DOCKER_USERNAME}/courses-backend:latest
    container_name: courses-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"

  # ── Frontend (Next.js) ────────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME}/courses-frontend:latest
    container_name: courses-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend
